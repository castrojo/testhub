name: Sync Flatpak Remote Index

# Triggered after each "Build → Sign → Publish Flatpak OCI" run completes successfully.
# Running as a separate workflow serialises all gh-pages pushes — no race
# between concurrent app builds writing to the same branch.
#
# Job order enforces a per-app gate:
#   prepare → e2e-install → commit-index
#
# e2e-install uploads one of:
#   - e2e-passed-<app>-<arch>
#   - e2e-bootstrap-skipped-<app>-<arch>
# commit-index only writes entries with one of these markers.
# bootstrap-skipped is accepted only for first-time onboarding (not yet indexed).
#
# commit-index re-downloads the digest artifacts from the triggering build run
# and reruns update-index.py — deterministic, no cross-job artifact needed.

on:
  workflow_run:
    workflows: ["Build → Sign → Publish Flatpak OCI"]
    types: [completed]

# Top-level: deny all. Jobs request only what they need.
permissions: {}

jobs:
  # ── Prepare: derive e2e matrix from digest artifacts ─────────────────────
  # Downloads per-arch digest artifacts from the triggering build run and
  # builds the matrix for e2e-install. Does NOT touch gh-pages.
  prepare:
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'main' &&
      (github.event.workflow_run.event == 'push' ||
       github.event.workflow_run.event == 'merge_group' ||
       github.event.workflow_run.event == 'workflow_dispatch')
    runs-on: ubuntu-24.04
    permissions:
      actions: read
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
      has_entries: ${{ steps.matrix.outputs.has_entries }}
    steps:
      - name: Download all digest artifacts from triggering run
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          pattern: digest-*
          path: /tmp/digests
          merge-multiple: true
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Build app+arch matrix from digest artifacts
        id: matrix
        run: |
          # Derive matrix from digest artifact files: digest-<app>-<arch>.txt
          # merge-multiple: true merges all matching artifacts into /tmp/digests/
          # so each file is digest-<app>-<arch>.txt at the root of /tmp/digests/.
          MATRIX=$(
            shopt -s nullglob
            entries=()
            for f in /tmp/digests/digest-*.txt; do
              filename=$(basename "$f")
              name="${filename%.txt}"
              rest="${name#digest-}"
              arch="${rest##*-}"
              app="${rest%-${arch}}"
              entries+=("{\"app\":\"${app}\",\"arch\":\"${arch}\"}")
            done
            if [[ ${#entries[@]} -eq 0 ]]; then
              echo '{"include":[]}'
            else
              joined=$(IFS=,; echo "${entries[*]}")
              echo "{\"include\":[${joined}]}"
            fi
          )
          echo "matrix=${MATRIX}" >> "$GITHUB_OUTPUT"
          echo "has_entries=$(echo "${MATRIX}" | python3 -c 'import sys,json; d=json.load(sys.stdin); print("true" if d.get("include") else "false")')" >> "$GITHUB_OUTPUT"

  # ── E2E install test ──────────────────────────────────────────────────────
  # Gate: runs BEFORE gh-pages is updated. Per-app: each matrix job uploads
  # pass or bootstrap-skip marker artifact. commit-index checks marker artifacts
  # before writing each app's index entry.
  #
  # Launch check: exit 0 = clean exit (PASS), exit 124 = timeout/headless GUI (PASS), other = FAIL
  # Apps that cannot launch headless must set x-skip-launch-check: true in their manifest.
  e2e-install:
    needs: [prepare]
    if: needs.prepare.outputs.has_entries == 'true'
    runs-on: ${{ matrix.arch == 'aarch64' && 'ubuntu-24.04-arm' || 'ubuntu-24.04' }}
    permissions:
      packages: read
    container:
      image: ghcr.io/flathub-infra/flatpak-github-actions:gnome-49
      options: --privileged
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.prepare.outputs.matrix) }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install yq
        run: just install-tools-yq

      - name: Install just
        run: |
          ARCH=$(uname -m | sed 's/x86_64/x86_64/;s/aarch64/aarch64/')
          curl -fsSL "https://github.com/casey/just/releases/download/1.40.0/just-1.40.0-${ARCH}-unknown-linux-musl.tar.gz" \
            | tar -xz -C /usr/local/bin just

      - name: Run install test
        run: |
          set +e
          just run-test '${{ matrix.app }}' '${{ matrix.arch }}'
          RC=$?
          set -e
          if [[ "${RC}" -eq 0 ]]; then
            touch /tmp/e2e-passed-${{ matrix.app }}-${{ matrix.arch }}
            echo "==> PASS: install test passed for ${{ matrix.app }} ${{ matrix.arch }}"
          elif [[ "${RC}" -eq 42 ]]; then
            touch /tmp/e2e-bootstrap-skipped-${{ matrix.app }}-${{ matrix.arch }}
            echo "==> INFO: bootstrap-skip for ${{ matrix.app }} ${{ matrix.arch }}"
          else
            echo "==> FAIL: install test failed for ${{ matrix.app }} ${{ matrix.arch }} (exit ${RC})" >&2
            exit "${RC}"
          fi

      - name: Upload e2e-passed artifact
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: e2e-passed-${{ matrix.app }}-${{ matrix.arch }}
          path: /tmp/e2e-passed-${{ matrix.app }}-${{ matrix.arch }}
          if-no-files-found: warn
          retention-days: 90

      - name: Upload e2e-bootstrap-skipped artifact
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: e2e-bootstrap-skipped-${{ matrix.app }}-${{ matrix.arch }}
          path: /tmp/e2e-bootstrap-skipped-${{ matrix.app }}-${{ matrix.arch }}
          if-no-files-found: warn
          retention-days: 90

      - name: Uninstall on failure
        if: always()
        run: |
          APP_ID=$(just metadata '${{ matrix.app }}' app-id 2>/dev/null || echo "")
          [[ -n "${APP_ID}" ]] && flatpak uninstall --user --noninteractive "${APP_ID}" || true

  # ── Commit index to gh-pages ──────────────────────────────────────────────
  # Runs only when e2e-install matrix fully succeeds.
  # Per-app gate: only writes index entries for apps whose pass/bootstrap marker exists.
  # Apps without valid marker are skipped; their last good index entry is preserved.
  # Serialised via concurrency group to prevent races between concurrent builds.
  commit-index:
    needs: [prepare, e2e-install]
    if: |
      needs.prepare.result == 'success' &&
      needs.e2e-install.result == 'success'
    runs-on: ubuntu-24.04
    permissions:
      contents: write
      packages: read
      actions: read
    concurrency:
      group: gh-pages-update
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          path: main

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: gh-pages
          path: pages

      - name: Download all digest artifacts from triggering run
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          pattern: digest-*
          path: /tmp/digests
          merge-multiple: true
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download all e2e-passed artifacts from this run
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          pattern: e2e-passed-*
          path: /tmp/e2e-passed
          merge-multiple: true
        continue-on-error: true

      - name: Download all e2e-bootstrap-skipped artifacts from this run
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          pattern: e2e-bootstrap-skipped-*
          path: /tmp/e2e-bootstrap-skipped
          merge-multiple: true
        continue-on-error: true

      - name: Login to ghcr.io for skopeo inspect
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | \
            skopeo login ghcr.io -u "${{ github.repository_owner }}" --password-stdin

      - name: Sync gh-pages before writing
        run: |
          cd pages
          git fetch origin gh-pages && git rebase origin/gh-pages

      - name: Update index for each app and arch
        run: |
          cd pages
          shopt -s nullglob
          : > /tmp/index-status.tsv
          for DIGEST_FILE in /tmp/digests/digest-*.txt; do
            filename=$(basename "${DIGEST_FILE}")
            name="${filename%.txt}"
            REST="${name#digest-}"
            ARCH="${REST##*-}"
            APP_ORIG="${REST%-${ARCH}}"
            APP="${APP_ORIG,,}"
            DIGEST=$(cat "${DIGEST_FILE}")
            FULL_REPO="${{ github.repository }}/${APP}"

            HAS_PASS=false
            HAS_BOOTSTRAP=false
            if [[ -f "/tmp/e2e-passed/e2e-passed-${APP_ORIG}-${ARCH}" ]] || \
               [[ -f "/tmp/e2e-passed/e2e-passed-${APP}-${ARCH}" ]]; then
              HAS_PASS=true
            fi
            if [[ -f "/tmp/e2e-bootstrap-skipped/e2e-bootstrap-skipped-${APP_ORIG}-${ARCH}" ]] || \
               [[ -f "/tmp/e2e-bootstrap-skipped/e2e-bootstrap-skipped-${APP}-${ARCH}" ]]; then
              HAS_BOOTSTRAP=true
            fi

            if [[ "${HAS_PASS}" != "true" && "${HAS_BOOTSTRAP}" != "true" ]]; then
              echo "==> SKIP index update: ${APP} ${ARCH} — no pass/bootstrap marker"
              printf '%s\t%s\t%s\n' "${APP}" "${ARCH}" "skip-no-marker" >> /tmp/index-status.tsv
              continue
            fi

            if [[ "${HAS_BOOTSTRAP}" == "true" && "${HAS_PASS}" != "true" ]]; then
              if APP_REPO="${FULL_REPO}" python3 -c 'import json, os; from pathlib import Path; p = Path("index/static"); d = json.loads(p.read_text()) if p.exists() else {"Results": []}; exists = any(r.get("Name") == os.environ["APP_REPO"] for r in d.get("Results", [])); raise SystemExit(0 if exists else 1)'
              then
                echo "ERROR: bootstrap marker refused for already-indexed app ${APP} ${ARCH}" >&2
                exit 1
              fi
            fi

            echo "==> Updating index: ${APP} ${ARCH} ${DIGEST}"
            python3 ../main/scripts/update-index.py \
              --app "${APP}" \
              --digest "${DIGEST}" \
              --registry ghcr.io \
              --repo "${FULL_REPO}" \
              --tags "latest"

            if [[ "${HAS_PASS}" == "true" ]]; then
              printf '%s\t%s\t%s\n' "${APP}" "${ARCH}" "pass" >> /tmp/index-status.tsv
            else
              printf '%s\t%s\t%s\n' "${APP}" "${ARCH}" "bootstrap-skip" >> /tmp/index-status.tsv
            fi
          done

      - name: Write index outcome summary
        if: always()
        run: |
          echo "## update-index outcomes" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| app | arch | outcome |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|---|" >> "$GITHUB_STEP_SUMMARY"
          shopt -s nullglob
          for DIGEST_FILE in /tmp/digests/digest-*.txt; do
            filename=$(basename "${DIGEST_FILE}")
            name="${filename%.txt}"
            REST="${name#digest-}"
            ARCH="${REST##*-}"
            APP_ORIG="${REST%-${ARCH}}"
            APP="${APP_ORIG,,}"
            OUTCOME="cancelled"
            if [[ -f /tmp/index-status.tsv ]]; then
              MATCH=$(rg -m1 "^${APP}\t${ARCH}\t" /tmp/index-status.tsv || true)
              if [[ -n "${MATCH}" ]]; then
                OUTCOME=$(printf '%s\n' "${MATCH}" | cut -f3)
              fi
            fi
            echo "| ${APP} | ${ARCH} | ${OUTCOME} |" >> "$GITHUB_STEP_SUMMARY"
          done

      - name: Commit and push index
        run: |
          cd pages
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index/static
          if git diff --cached --quiet; then
            echo "index unchanged, skipping commit"
          else
            git commit -m "chore(index): update from build ${{ github.event.workflow_run.run_number }} [skip ci]"
            git push
          fi
